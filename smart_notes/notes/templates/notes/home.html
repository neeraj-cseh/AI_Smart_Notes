<!DOCTYPE html>
<html>
<head>
    <title>Smart Notes</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e1e2f, #2b5876);
            color: white;
        }

        .card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
        }

        .loader {
            display: none;
        }
    </style>
</head>

<body class="container mt-4">

<h2>🚀 Smart Notes</h2>

<a href="{% url 'create_note' %}" class="btn btn-light mb-3">Create</a>

{% for note in notes %}
<div class="card p-3 mb-3">
    <h5>{{ note.title }}</h5>
    <p>{{ note.content }}</p>

    <div id="loader-{{note.id}}" class="loader text-warning">
        ⏳ Generating...
    </div>

    <a href="{% url 'summarize_note' note.id %}" 
       onclick="showLoader({{note.id}}, this)" 
       class="btn btn-warning">
        Summarize
    </a>

    {% if note.summary %}
        <hr>
        <p><strong>Summary:</strong> {{ note.summary }}</p>
    {% endif %}
</div>
{% endfor %}

<script>
function showLoader(id, btn){
    document.getElementById("loader-"+id).style.display="block";
    btn.disabled = true;
}
</script>

</body>
</html>
