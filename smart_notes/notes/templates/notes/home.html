<!DOCTYPE html>
<html>
<head>
    <title>Smart Notes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Your Notes</h2>

<a href="{% url 'create_note' %}" class="btn btn-primary mb-3">Create Note</a>

{% for note in notes %}
<div class="card mb-3">
    <div class="card-body">
        <h5>{{ note.title }}</h5>
        <p>{{ note.content }}</p>

        <!-- ✅ Summarize Button -->
        <a href="{% url 'summarize_note' note.id %}" class="btn btn-warning">
            Summarize
        </a>

        <!-- ✅ Show Summary -->
        {% if note.summary %}
            <hr>
            <strong>Summary:</strong>
            <p>{{ note.summary }}</p>
        {% endif %}
    </div>
</div>
{% endfor %}

</body>
</html>
